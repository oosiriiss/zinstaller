input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
	scroll_factor = 0.3
        drag_lock = false
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more

gesture = 3, horizontal, workspace
gesture = 2, pinchin, fullscreen,maximize
gesture = 2, pinchout, fullscreen,maximize
gesture = 3, horizontal, mod:SUPER,resize

