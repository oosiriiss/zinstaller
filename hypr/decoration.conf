# // https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 10

    active_opacity = 1

	inactive_opacity = 0.95

    blur {
        enabled = false
        size = 3
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

