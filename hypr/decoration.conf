# // https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 10

    active_opacity = 1

    inactive_opacity = 1

    blur {
        enabled = false
        size = 3
        passes = 1
    }

    dim_inactive = true
    dim_strength = 0.1
}

