
// All paths must be relative to the executable


config {

   // Path to the system .config directory which will be passed to every setup script as a CONFIG_DIR_PATH environment variable
   config_dir_path = "~/.config";

   // Path to a file that will contain detailed runtime information
   log_file_path = "./out.log";

   // Path to a directory with setup scripts (working directory of setup scripts)
   scripts_dir_path = "./setup_scripts";

   // Path to a file with a package list
   packages_file_path = "./packages.list";

   // Path to dofiles directory which will be passed to every setup script as a DOTFILES_DIR_PATH environment variable 
   dotfiles_dir_path = "./dotfiles";

   // Path to a file where a cache file will be produced 
   cache_file_path = "./packages.cache";
}
