// All paths must be relative to the executable

config {

   // Path to the system .config directory which will be passed to every setup scripts as a CONFIG_DIR_PATH environment variable
   config_dir = "~/.config";

   // Path to a file that will contain detailed runtime information
   log_file = "./out.log";

   // Path to a directory with setup scripts (working directory of setup scripts)
   scripts_dir = "./devel_scripts";

   // Path to a file with a package list
   packages_file = "./devel_packages.list";

   // Path to dofiles directory
   dotfiles_dir = "./dotfiles";

   // Path to a file where a cache file will be produced 
   cache_file = "./packages.cache";

   // Setup command will stop execution whenever a command returns nonzero code
   // This doesn't automatically work for commands invoked inside of scripts (if package.setup_command = "./some_script.sh" and a command inside of ./some_script.sh fails but without terminating the script).
   // If you want to make sure the script exits if a command fails you should put "set -e" command on the top of it.
   setup_script_stop_on_fail = true;
}
